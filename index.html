<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EID SPECIAL GIFT 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --dark-blue: #020111;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }

        body {
            background: var(--dark-blue);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Animated Background */
        .bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }

        .container {
            width: 92%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 35px 20px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1.5s ease;
            position: relative;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .moon-icon {
            font-size: 60px;
            filter: drop-shadow(0 0 15px var(--gold));
            margin-bottom: 15px;
            display: inline-block;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
        }

        .name-display {
            font-size: 1.6rem;
            font-weight: 700;
            color: #00ffcc;
            margin-bottom: 15px;
            min-height: 40px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .wish-text {
            font-size: 1.05rem;
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 20px;
            font-style: italic;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 15px;
            border-left: 3px solid var(--gold);
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 50px;
            border: 2px solid var(--gold);
            background: transparent;
            color: white;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(45deg, var(--gold), #ffae00);
            color: #000;
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            font-size: 1rem;
        }

        button:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--gold); }

        /* Salami Box Section */
        #gift-section { display: none; margin-top: 10px; }
        
        .gift-box {
            font-size: 80px;
            cursor: pointer;
            transition: 0.5s;
            margin: 15px 0;
        }

        .gift-box:hover { transform: rotate(15deg) scale(1.2); }

        .revealed-salami {
            font-size: 1.6rem;
            color: #fff;
            background: rgba(255, 215, 0, 0.2);
            padding: 15px;
            border-radius: 15px;
            display: none;
            margin-top: 15px;
            font-weight: bold;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        .wa-btn {
            display: none;
            margin-top: 20px;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            animation: fadeIn 1s forwards;
        }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>
    <audio id="bgMusic" loop src="https://raw.githubusercontent.com/nafis1630/Eid-Gift-By-Nafis-Fuad-/main/Islamicsound.mp3"></audio>

    <div class="container" id="mainContainer">
        <div class="moon-icon">🌙</div>
        <h1>Eid Mubarak</h1>
        <div class="name-display" id="displayName">শুভেচ্ছান্তে আপনার নাম</div>
        
        <!-- আনাবিয়ার জন্য বিশেষ শুভেচ্ছা বার্তা (লিংক দিয়ে ঢুকলে এটি দেখাবে) -->
        <div id="specialWish" class="wish-text" style="display: none;">
            "আকাশে উঠেছে নতুন চাঁদ, নিয়ে এলো খুশির রাত।<br>
            সবাইকে জানাই ঈদের দাওয়াত, সুন্দর কাটুক দিন-রাত।"<br>
            <strong style="color: var(--gold); font-style: normal; display:block; margin-top:5px;">ঈদ মোবারক, আনাবিয়া ইসলাম! ✨</strong>
        </div>
        
        <div id="input-area">
            <input type="text" id="userName" placeholder="আপনার নাম লিখুন">
            <br>
            <button onclick="createMagic()">ম্যাজিক দেখুন ✨</button>
        </div>

        <div id="gift-section">
            <p style="font-size: 1.1rem; color: #ffeb3b;">আপনার ঈদ সেলামি নিতে বক্সে ট্যাপ করুন!</p>
            <div class="gift-box" id="box" onclick="revealSalami()">🎁</div>
            <div class="revealed-salami" id="salamiResult"></div>
            <a href="#" class="wa-btn" id="waLink" target="_blank">WhatsApp-এ শেয়ার করুন 🚀</a>
        </div>
    </div>

    <script>
        let finalName = "";

        // পেজ লোড হতেই চেক করবে লিংক-এ নাম আছে কিনা
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const nameParam = urlParams.get('name');

            if (nameParam) {
                finalName = decodeURIComponent(nameParam);
                
                // নাম যদি 'আনাবিয়া ইসলাম' বা 'আনাবিয়া' হয় তবে স্পেশাল কবিতা দেখাবে
                if(finalName.includes("আনাবিয়া")) {
                    document.getElementById('specialWish').style.display = 'block';
                }
                
                startMagic(finalName);
            }
        };

        function createMagic() {
            const inputName = document.getElementById('userName').value;
            if (!inputName) { alert("নাম না লিখলে ম্যাজিক হবে না!"); return; }
            finalName = inputName;
            startMagic(finalName);
        }

        function startMagic(name) {
            document.getElementById('displayName').innerText = "শুভেচ্ছান্তে: " + name;
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('gift-section').style.display = 'block';
            
            // ব্যাকগ্রাউন্ড মিউজিক প্লে করার চেষ্টা
            document.getElementById('bgMusic').play().catch(error => {
                console.log("Autoplay blocked. Will play on click.");
            });

            // আতশবাজি ইফেক্ট
            var duration = 5 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#FFD700', '#ffffff', '#00ffcc'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#FFD700', '#ffffff', '#00ffcc'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function revealSalami() {
            const amounts = [500, 1000, 2000, 5000, "আনলিমিটেড"];
            const prize = amounts[Math.floor(Math.random() * amounts.length)];
            
            const box = document.getElementById('box');
            const result = document.getElementById('salamiResult');
            const waBtn = document.getElementById('waLink');

            document.getElementById('bgMusic').play().catch(() => {});

            box.style.display = 'none';
            result.innerHTML = "আপনি পেয়েছেন <br><span style='color:#FFD700; font-size:2.2rem;'>৳" + prize + "</span> সালামি! 💸";
            result.style.display = 'block';
            waBtn.style.display = 'inline-block';

            const baseUrl = window.location.href.split('?')[0];
            const shareUrl = ${baseUrl}?name=${encodeURIComponent(finalName)};
            
            const message = ${finalName} আপনাকে একটি ম্যাজিক্যাল ঈদ গিফট পাঠিয়েছে! 🌙\nআপনিও আপনার সেলামি বুঝে নিন এই লিংকে ক্লিক করে: ${shareUrl};
            waBtn.href = "https://wa.me/?text=" + encodeURIComponent(message);

            // বড় করে কনফেটি ব্লাস্ট
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
